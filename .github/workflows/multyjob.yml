name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Quality gate
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2: Build — hanya jalan kalau lint sukses
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}", cache: "npm" }
      - run: npm ci
      - run: npm run build
      - if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with: { name: build-info, path: dist/build-info.json }

  # ─────────────────────────────────────────
  # JOB 3: Package — hanya di push ke main (bukan di PR)
  # ─────────────────────────────────────────
  package:
    name: Package (main only)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with: { name: build-info }
      - name: Tampilkan hasil
        run: |
          echo "Siap di-package. Isi build-info:"
          cat build-info.json

  # ─────────────────────────────────────────
  # JOB 4: Notifikasi Slack — SUKSES
  # Jalan kalau lint + build + package semua sukses
  # ─────────────────────────────────────────
  notify-success:
    name: Notify Slack (Success)
    runs-on: ubuntu-latest
    needs: [lint, build, package]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.package.result == 'success' || needs.package.result == 'skipped')
    steps:
      - name: Send success to Slack
        run: |
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"halo ada yang push ke github mu nih!\",
              \"attachments\": [
                {
                  \"color\": \"#36a64f\",
                  \"fields\": [
                    { \"title\": \"Status\",         \"value\": \"CI PASSED\",     \"short\": true },
                    { \"title\": \"Branch\",         \"value\": \"${BRANCH}\",     \"short\": true },
                    { \"title\": \"Pushed by\",      \"value\": \"${ACTOR}\",      \"short\": true },
                    { \"title\": \"Repository\",     \"value\": \"${REPO}\",       \"short\": true },
                    { \"title\": \"Commit\",         \"value\": \"<${COMMIT_URL}|${SHORT_SHA}> — ${COMMIT_MSG}\", \"short\": false },
                    { \"title\": \"Lihat pipeline\", \"value\": \"<${RUN_URL}|Buka di GitHub Actions>\", \"short\": false }
                  ],
                  \"footer\": \"GitHub Actions\",
                  \"footer_icon\": \"https://github.githubassets.com/favicons/favicon.png\"
                }
              ]
            }"

  # ─────────────────────────────────────────
  # JOB 5: Notifikasi Slack — GAGAL
  # Jalan kalau salah satu job ada yang gagal
  # ─────────────────────────────────────────
  notify-failure:
    name: Notify Slack (Failure)
    runs-on: ubuntu-latest
    needs: [lint, build, package]
    if: |
      always() &&
      (needs.lint.result == 'failure' ||
       needs.build.result == 'failure' ||
       needs.package.result == 'failure')
    steps:
      - name: Send failure to Slack
        run: |
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          LINT_STATUS="${{ needs.lint.result }}"
          BUILD_STATUS="${{ needs.build.result }}"
          PACKAGE_STATUS="${{ needs.package.result }}"
          FAILED_JOBS=""
          if [ "$LINT_STATUS" = "failure" ]; then FAILED_JOBS="Lint"; fi
          if [ "$BUILD_STATUS" = "failure" ]; then
            if [ -n "$FAILED_JOBS" ]; then FAILED_JOBS="${FAILED_JOBS}, Build"
            else FAILED_JOBS="Build"; fi
          fi
          if [ "$PACKAGE_STATUS" = "failure" ]; then
            if [ -n "$FAILED_JOBS" ]; then FAILED_JOBS="${FAILED_JOBS}, Package"
            else FAILED_JOBS="Package"; fi
          fi

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"halo ada yang push ke github mu nih!\",
              \"attachments\": [
                {
                  \"color\": \"#e01e5a\",
                  \"fields\": [
                    { \"title\": \"Status\",          \"value\": \"CI FAILED\",        \"short\": true },
                    { \"title\": \"Branch\",          \"value\": \"${BRANCH}\",        \"short\": true },
                    { \"title\": \"Pushed by\",       \"value\": \"${ACTOR}\",         \"short\": true },
                    { \"title\": \"Job gagal\",       \"value\": \"${FAILED_JOBS}\",   \"short\": true },
                    { \"title\": \"Commit\",          \"value\": \"<${COMMIT_URL}|${SHORT_SHA}> — ${COMMIT_MSG}\", \"short\": false },
                    { \"title\": \"Lihat log error\", \"value\": \"<${RUN_URL}|Buka di GitHub Actions>\", \"short\": false }
                  ],
                  \"footer\": \"GitHub Actions\",
                  \"footer_icon\": \"https://github.githubassets.com/favicons/favicon.png\"
                }
              ]
            }"
