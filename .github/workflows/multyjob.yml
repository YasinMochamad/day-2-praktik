name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2: Test (Jest + jest-junit)
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests + coverage
        run: npm run test:ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
      - name: Upload junit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: reports/junit.xml
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Build — hanya jalan kalau test sukses
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ matrix.node }}", cache: "npm" }
      - run: npm ci
      - run: npm run build
      - if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with: { name: build-info, path: dist/build-info.json }

  # ─────────────────────────────────────────
  # JOB 4: Package — hanya di push ke main
  # ─────────────────────────────────────────
  package:
    name: Package (main only)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with: { name: build-info, path: dist/ }
      - name: Tampilkan hasil
        run: |
          echo "Siap di-package. Isi build-info:"
          cat dist/build-info.json

  # ─────────────────────────────────────────
  # JOB 5: Deploy Staging — otomatis setelah package
  # Analog: deploy_staging di GitLab CI (STEP 15)
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [package]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install dependencies
        run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with: { name: build-info, path: dist/ }
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with: { name: coverage, path: coverage/ }
      - name: Generate site
        run: npm run site
      - name: Simulate staging deploy
        run: |
          echo "📦 Deploy artifact ${{ github.sha }} ke STAGING"
          node -e "console.log(require('./src/stringUtils').capitalize('deploy sukses'))"
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: public/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 6: Deploy Production — MANUAL GATE
  # Analog: deploy_production when: manual (STEP 15)
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy Production (manual)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: Deploy ke production
        run: |
          echo "🚀 Deploy ke PRODUCTION (disetujui manual)"
          echo "Rilis ${{ github.sha }} aktif."

  # ─────────────────────────────────────────
  # JOB 7: GitHub Pages — publish public/
  # Analog: job pages di GitLab CI (STEP 14)
  # ─────────────────────────────────────────
  pages:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install dependencies
        run: npm ci
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with: { name: build-info, path: dist/ }
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with: { name: coverage, path: coverage/ }
      - name: Generate site
        run: npm run site
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: public/ }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────
  # JOB 8: Notifikasi Slack — SUKSES
  # ─────────────────────────────────────────
  notify-success:
    name: Notify Slack (Success)
    runs-on: ubuntu-latest
    needs: [lint, test, build, package, deploy-staging, deploy-production, pages]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.package.result == 'success' || needs.package.result == 'skipped') &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (needs.deploy-production.result == 'success' || needs.deploy-production.result == 'skipped') &&
      (needs.pages.result == 'success' || needs.pages.result == 'skipped')
    steps:
      - name: Send success to Slack
        run: |
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"halo ada yang push ke github mu nih!\",
              \"attachments\": [
                {
                  \"color\": \"#36a64f\",
                  \"fields\": [
                    { \"title\": \"Status\",         \"value\": \"CI PASSED\",              \"short\": true },
                    { \"title\": \"Branch\",         \"value\": \"${BRANCH}\",              \"short\": true },
                    { \"title\": \"Pushed by\",      \"value\": \"${ACTOR}\",               \"short\": true },
                    { \"title\": \"Repository\",     \"value\": \"${REPO}\",                \"short\": true },
                    { \"title\": \"Commit\",         \"value\": \"<${COMMIT_URL}|${SHORT_SHA}> — ${COMMIT_MSG}\", \"short\": false },
                    { \"title\": \"Lihat pipeline\", \"value\": \"<${RUN_URL}|Buka di GitHub Actions>\",          \"short\": false },
                    { \"title\": \"Live site\",      \"value\": \"<${PAGES_URL}|Buka GitHub Pages>\",             \"short\": false }
                  ],
                  \"footer\": \"GitHub Actions\",
                  \"footer_icon\": \"https://github.githubassets.com/favicons/favicon.png\"
                }
              ]
            }"

  # ─────────────────────────────────────────
  # JOB 9: Notifikasi Slack — GAGAL
  # ─────────────────────────────────────────
  notify-failure:
    name: Notify Slack (Failure)
    runs-on: ubuntu-latest
    needs: [lint, test, build, package, deploy-staging, deploy-production, pages]
    if: |
      always() &&
      (needs.lint.result == 'failure' ||
       needs.test.result == 'failure' ||
       needs.build.result == 'failure' ||
       needs.package.result == 'failure' ||
       needs.deploy-staging.result == 'failure' ||
       needs.deploy-production.result == 'failure' ||
       needs.pages.result == 'failure')
    steps:
      - name: Send failure to Slack
        run: |
          COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          ACTOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          FAILED_JOBS=""
          add_failed() { if [ -n "$FAILED_JOBS" ]; then FAILED_JOBS="${FAILED_JOBS}, $1"; else FAILED_JOBS="$1"; fi }
          [ "${{ needs.lint.result }}"              = "failure" ] && add_failed "Lint"
          [ "${{ needs.test.result }}"              = "failure" ] && add_failed "Test"
          [ "${{ needs.build.result }}"             = "failure" ] && add_failed "Build"
          [ "${{ needs.package.result }}"           = "failure" ] && add_failed "Package"
          [ "${{ needs.deploy-staging.result }}"    = "failure" ] && add_failed "Deploy Staging"
          [ "${{ needs.deploy-production.result }}" = "failure" ] && add_failed "Deploy Production"
          [ "${{ needs.pages.result }}"             = "failure" ] && add_failed "Pages"

          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"halo ada yang push ke github mu nih!\",
              \"attachments\": [
                {
                  \"color\": \"#e01e5a\",
                  \"fields\": [
                    { \"title\": \"Status\",          \"value\": \"CI FAILED\",        \"short\": true },
                    { \"title\": \"Branch\",          \"value\": \"${BRANCH}\",        \"short\": true },
                    { \"title\": \"Pushed by\",       \"value\": \"${ACTOR}\",         \"short\": true },
                    { \"title\": \"Job gagal\",       \"value\": \"${FAILED_JOBS}\",   \"short\": true },
                    { \"title\": \"Commit\",          \"value\": \"<${COMMIT_URL}|${SHORT_SHA}> — ${COMMIT_MSG}\", \"short\": false },
                    { \"title\": \"Lihat log error\", \"value\": \"<${RUN_URL}|Buka di GitHub Actions>\",          \"short\": false }
                  ],
                  \"footer\": \"GitHub Actions\",
                  \"footer_icon\": \"https://github.githubassets.com/favicons/favicon.png\"
                }
              ]
            }"
