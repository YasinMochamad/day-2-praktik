name: CI + Slack Notification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2: Build (hanya jalan kalau lint lulus)
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build validation
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: dist/build-info.json

  # ─────────────────────────────────────────
  # JOB 3: Notifikasi Slack — SUKSES
  # Hanya jalan kalau lint & build keduanya LULUS
  # ─────────────────────────────────────────
  notify-success:
    name: ✅ Notify Slack (Success)
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: success()
    steps:
      - name: Send success notification to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *CI PASSED* — `${{ github.repository }}`",
              "attachments": [
                {
                  "color": "#36a64f",
                  "fields": [
                    {
                      "title": "Branch",
                      "value": "`${{ github.ref_name }}`",
                      "short": true
                    },
                    {
                      "title": "Triggered by",
                      "value": "`${{ github.actor }}`",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha != '' && github.sha || 'N/A' }}>",
                      "short": false
                    },
                    {
                      "title": "Message",
                      "value": "${{ github.event.head_commit.message }}",
                      "short": false
                    }
                  ],
                  "footer": "GitHub Actions",
                  "ts": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ─────────────────────────────────────────
  # JOB 4: Notifikasi Slack — GAGAL
  # Jalan kalau lint ATAU build ada yang GAGAL
  # ─────────────────────────────────────────
  notify-failure:
    name: ❌ Notify Slack (Failure)
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: failure()
    steps:
      - name: Send failure notification to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ *CI FAILED* — `${{ github.repository }}`",
              "attachments": [
                {
                  "color": "#e01e5a",
                  "fields": [
                    {
                      "title": "Branch",
                      "value": "`${{ github.ref_name }}`",
                      "short": true
                    },
                    {
                      "title": "Triggered by",
                      "value": "`${{ github.actor }}`",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha != '' && github.sha || 'N/A' }}>",
                      "short": false
                    },
                    {
                      "title": "Message",
                      "value": "${{ github.event.head_commit.message }}",
                      "short": false
                    },
                    {
                      "title": "Detail",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Lihat log di sini>",
                      "short": false
                    }
                  ],
                  "footer": "GitHub Actions",
                  "ts": "${{ github.event.head_commit.timestamp }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
